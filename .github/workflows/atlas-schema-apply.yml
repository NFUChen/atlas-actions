name: Atlas Schema Apply

on:
  workflow_call:
    inputs:
      schema-path:
        description: "Path to the Atlas HCL schema file or directory (relative to repo root)"
        required: true
        type: string
      dev-url:
        description: "Atlas dev database URL for diff calculation"
        required: false
        type: string
        default: "docker://postgres/15"
      exclude:
        description: "Comma-separated glob patterns to exclude database objects from apply (e.g. '*.audit_logs,temp_*'). Supports type filters like '*[type=function]'. Each pattern is passed as a separate --exclude flag."
        required: false
        type: string
        default: ""
      atlas-version:
        description: "Atlas binary version tag from NFUChen/atlas releases"
        required: false
        type: string
        default: "v0.1.2"
    secrets:
      db-url:
        description: "Target database connection URL"
        required: true
      wg-config-file:
        description: "WireGuard configuration file content for VPN tunnel"
        required: false

jobs:
  apply:
    name: Schema Apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Set up WireGuard connection
        if: ${{ env.WG_CONFIG_FILE != '' }}
        uses: ./.github/actions/wireguard
        env:
          WG_CONFIG_FILE: ${{ secrets.wg-config-file }}
        with:
          WG_CONFIG_FILE: ${{ secrets.wg-config-file }}

      - name: Check database connectivity
        env:
          DB_URL: ${{ secrets.db-url }}
        run: |
          # Parse host and port from database URL
          # Supports formats like postgres://user:pass@host:port/dbname
          DB_HOST=$(echo "$DB_URL" | sed -E 's|.*@([^:/]+).*|\1|')
          DB_PORT=$(echo "$DB_URL" | sed -E 's|.*:([0-9]+)/.*|\1|')
          # Default to 5432 if port not found
          if ! echo "$DB_PORT" | grep -qE '^[0-9]+$'; then
            DB_PORT=5432
          fi
          echo "Testing connectivity to ${DB_HOST}:${DB_PORT}..."
          if ! nc -zv -w 10 "$DB_HOST" "$DB_PORT" 2>&1; then
            echo "::error::Cannot reach database at ${DB_HOST}:${DB_PORT}. Aborting apply."
            exit 1
          fi
          echo "Database connectivity check passed."

      - name: Download Atlas binary
        env:
          ATLAS_VERSION: ${{ inputs.atlas-version }}
        run: |
          curl -fsSL "https://github.com/NFUChen/atlas/releases/download/${ATLAS_VERSION}/atlas-linux-amd64" -o /usr/local/bin/atlas
          chmod +x /usr/local/bin/atlas
          atlas version

      - name: Dry run - preview changes
        id: dry-run
        env:
          DB_URL: ${{ secrets.db-url }}
          SCHEMA_PATH: ${{ inputs.schema-path }}
          DEV_URL: ${{ inputs.dev-url }}
          EXCLUDE: ${{ inputs.exclude }}
        run: |
          EXCLUDE_ARGS=()
          if [ -n "$EXCLUDE" ]; then
            IFS=',' read -ra PATTERNS <<< "$EXCLUDE"
            for pattern in "${PATTERNS[@]}"; do
              trimmed=$(echo "$pattern" | xargs)
              [ -n "$trimmed" ] && EXCLUDE_ARGS+=(--exclude "$trimmed")
            done
          fi
          OUTPUT=$(atlas schema apply \
            --url "$DB_URL" \
            --to "file://$SCHEMA_PATH" \
            --dev-url "$DEV_URL" \
            --dry-run \
            "${EXCLUDE_ARGS[@]}" 2>&1)
          {
            echo "plan<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write dry-run to job summary
        env:
          SCHEMA_PATH: ${{ inputs.schema-path }}
          DEV_URL: ${{ inputs.dev-url }}
          PLAN_OUTPUT: ${{ steps.dry-run.outputs.plan }}
        run: |
          {
            echo "## Atlas Schema Apply"
            echo ""
            echo "**Schema path**: \`${SCHEMA_PATH}\`"
            echo "**Dev URL**: \`${DEV_URL}\`"
            echo ""
            echo "### Dry Run - Changes to Apply"
            echo ""
            echo '```sql'
            echo "$PLAN_OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply schema changes
        env:
          DB_URL: ${{ secrets.db-url }}
          SCHEMA_PATH: ${{ inputs.schema-path }}
          DEV_URL: ${{ inputs.dev-url }}
          EXCLUDE: ${{ inputs.exclude }}
        run: |
          EXCLUDE_ARGS=()
          if [ -n "$EXCLUDE" ]; then
            IFS=',' read -ra PATTERNS <<< "$EXCLUDE"
            for pattern in "${PATTERNS[@]}"; do
              trimmed=$(echo "$pattern" | xargs)
              [ -n "$trimmed" ] && EXCLUDE_ARGS+=(--exclude "$trimmed")
            done
          fi
          atlas schema apply \
            --url "$DB_URL" \
            --to "file://$SCHEMA_PATH" \
            --dev-url "$DEV_URL" \
            --auto-approve \
            "${EXCLUDE_ARGS[@]}"
