name: Docker Build & Push (ECR)

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full ECR image name (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/myapp)"
        required: true
        type: string
      aws-region:
        description: "AWS region for ECR (e.g. us-east-1)"
        required: true
        type: string
      tags:
        description: "Newline-separated list of tags (e.g. latest, abc1234, v1.0.0)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Comma-separated target platforms (e.g. linux/amd64,linux/arm64)"
        required: false
        type: string
        default: "linux/amd64"
      build-args:
        description: "Newline-separated build arguments (e.g. NODE_ENV=production)"
        required: false
        type: string
        default: ""
      push:
        description: "Whether to push the image after building (set false for build-only validation)"
        required: false
        type: boolean
        default: true
    secrets:
      aws-access-key-id:
        description: "AWS access key ID"
        required: true
      aws-secret-access-key:
        description: "AWS secret access key"
        required: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: ${{ inputs.push }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: ${{ inputs.push }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAGS_INPUT: ${{ inputs.tags }}
        run: |
          FULL_TAGS=""
          while IFS= read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            if [ -n "$FULL_TAGS" ]; then
              FULL_TAGS="${FULL_TAGS},"
            fi
            FULL_TAGS="${FULL_TAGS}${IMAGE_NAME}:${tag}"
          done <<< "$TAGS_INPUT"
          echo "tags=${FULL_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAGS_INPUT: ${{ inputs.tags }}
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
        run: |
          {
            echo "## Docker Build & Push (ECR)"
            echo ""
            if [ "$PUSH" = "true" ]; then
              echo "**Status**: Pushed"
            else
              echo "**Status**: Built (not pushed)"
            fi
            echo "**Image**: \`${IMAGE_NAME}\`"
            echo "**Platforms**: \`${PLATFORMS}\`"
            echo ""
            echo "### Tags"
            echo ""
            while IFS= read -r tag; do
              tag=$(echo "$tag" | xargs)
              [ -z "$tag" ] && continue
              echo "- \`${IMAGE_NAME}:${tag}\`"
            done <<< "$TAGS_INPUT"
          } >> "$GITHUB_STEP_SUMMARY"
