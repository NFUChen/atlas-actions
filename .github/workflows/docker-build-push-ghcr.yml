name: Docker Build & Push (GHCR)

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full image name (e.g. ghcr.io/org/app)"
        required: true
        type: string
      tags:
        description: "Newline-separated list of tags (e.g. latest, abc1234, v1.0.0)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Comma-separated target platforms (e.g. linux/amd64,linux/arm64)"
        required: false
        type: string
        default: "linux/amd64"
      build-args:
        description: "Newline-separated build arguments (e.g. NODE_ENV=production)"
        required: false
        type: string
        default: ""
      push:
        description: "Whether to push the image after building (set false for build-only validation)"
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAGS_INPUT: ${{ inputs.tags }}
        run: |
          FULL_TAGS=""
          while IFS= read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            if [ -n "$FULL_TAGS" ]; then
              FULL_TAGS="${FULL_TAGS},"
            fi
            FULL_TAGS="${FULL_TAGS}${IMAGE_NAME}:${tag}"
          done <<< "$TAGS_INPUT"
          echo "tags=${FULL_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build-args }}

      - name: Write job summary
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAGS_INPUT: ${{ inputs.tags }}
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
        run: |
          {
            echo "## Docker Build & Push (GHCR)"
            echo ""
            if [ "$PUSH" = "true" ]; then
              echo "**Status**: Pushed"
            else
              echo "**Status**: Built (not pushed)"
            fi
            echo "**Image**: \`${IMAGE_NAME}\`"
            echo "**Platforms**: \`${PLATFORMS}\`"
            echo ""
            echo "### Tags"
            echo ""
            while IFS= read -r tag; do
              tag=$(echo "$tag" | xargs)
              [ -z "$tag" ] && continue
              echo "- \`${IMAGE_NAME}:${tag}\`"
            done <<< "$TAGS_INPUT"
          } >> "$GITHUB_STEP_SUMMARY"
